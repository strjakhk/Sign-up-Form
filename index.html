<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign-in Form</title>
    <link rel="preload" href="img/moon.jpg" as="image">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="media-queries.css">
</head>
<body>
    <main class="main-content">

        <div class="content-left"> <!-- set background here -->
            <div class="logo">
                <svg fill="#D2D2D2" height="128px" width="128px" version="1.1" id="Capa_1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 332.786 332.786" xml:space="preserve"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <g> <g id="Layer_5_87_"> <g> <path d="M86.564,211.083c-5.085-5.083-7-2.529-8.131-1.397c-29.282,29.282-55.278,99.935-41.535,93.034 c50.03-25.12,58.366-17.641,87.647-46.921c1.132-1.132,3.735-2.998-1.498-8.232L86.564,211.083z"></path> <path d="M244.419,210.691c-1.327-4.223,1.453-6.258,2.623-7.521C311.67,133.396,352.744,40.435,322.306,9.995 c-30.278-30.276-120.372,11.998-190.127,76.16c-1.38,1.271-4.1,3.678-8.966,2.662l-21.733-5.175 c-6.034-1.435-14.56,0.977-18.946,5.363L2.789,168.749c-4.386,4.387-2.961,8.764,3.167,9.726l57.677,9.064 c6.128,0.964,14.73-1.837,19.115-6.224c0,0,2.976-2.984,5.966,0.005c16.496,16.494,47.15,47.148,62.866,62.865 c3.124,3.123,0.132,6.094,0.132,6.094c-4.387,4.387-7.187,12.987-6.223,19.116l9.063,57.676c0.963,6.13,5.34,7.555,9.726,3.168 l79.746-79.746c4.385-4.386,6.798-12.91,5.361-18.944L244.419,210.691z M226.565,107.666c-13.507-13.507-13.507-35.404,0-48.909 c13.506-13.507,35.403-13.507,48.911,0c13.505,13.504,13.505,35.402,0,48.908C261.968,121.172,240.07,121.172,226.565,107.666z"></path> </g> </g> </g> </g></svg>
                <h1>Toward the moon</h1>
            </div>
        </div>
        <section class="content-right">
            <div class="form-info">
                <h1>Sign up to take your first trip to the moon</h1>
                <p><em>Fill out the form below so we can add you to the waiting list for the most important journey of your life: to the moon.<em></em></p>
            </div>
            <form action="#" class="form">
                <div class="field">
                    <input type="text" name="first-name" id="first-name" placeholder=" " required minlength="3" maxlength="20">
                    <label for="first-name">First name*</label>
                </div>
                <div class="field">
                    <input type="text" name="last-name" id="last-name" placeholder=" " minlength="3" maxlength="20">
                    <label for="last-name">Last name</label>
                </div>
                <div class="field">
                    <input type="email" name="email" id="email" placeholder=" " required>
                    <label for="email">Email*</label>
                </div>
                <div class="field">
                    <input type="tel" name="phone" id="phone" placeholder=" ">
                    <label for="phone">Phone number</label>
                </div>
                <div class="field">
                    <input type="password" name="passwd" id="passwd" placeholder=" " required>
                    <label for="passwd">Password*</label>
                </div>
                <div class="field">
                    <input type="password" name="confirm-passwd" id="confirm-passwd" placeholder=" " required>
                    <label for="confirm-passwd">Confirm password*</label>
                </div>
                <div class="field">
                    <button type="submit">
                        Sign up
                    </button>
                </div>
            </form>
        </section>
    </main>
</body>
</html>
